[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sumd"
version = "0.1.24"
description = "Structured Unified Markdown Descriptor"
requires-python = ">=3.10"
dependencies = [
    "click>=8.0",
    "pyyaml>=6.0",
    "toml>=0.10.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "ruff>=0.1",
    "build",
    "twine",
    "pyqual>=0.1",
    "pytest-json-report>=1.5",
]
mcp = ["mcp>=1.0.0"]

[tool.hatch.envs.default]
type = "virtual"
path = ".venv"
dev-mode = true

[tool.hatch.envs.default.scripts]
test = "pytest -q {args}"
lint = "ruff check ."
fmt = "ruff format ."
quality = "pyqual run"
quality-fix = "pyqual run --fix"

[tool.hatch.envs.dev]
dependencies = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "ruff>=0.1",
    "pyqual>=0.1",
]

[tool.hatch.version]
path = "sumd/__init__.py"
